<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老王家面馆 · 扫码点餐</title>
<meta name="description" content="扫码点餐，无需下载，即点即走。">
<style>
:root{--bg:#f5f1eb;--card:#fff;--text:#2c2416;--muted:#8b7355;--accent:#d4451d;--accent2:#e8833a;--border:#e8dfd5;--success:#2d8c4a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}
/* Header */
.header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:20px 16px;text-align:center}
.header .shop-name{font-size:1.4rem;font-weight:700}
.header .shop-desc{font-size:0.85rem;opacity:0.85;margin-top:4px}
.header .table-info{font-size:0.8rem;margin-top:8px;background:rgba(255,255,255,0.2);display:inline-block;padding:4px 12px;border-radius:12px}
/* Category tabs */
.cats{display:flex;gap:0;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.cat{padding:14px 16px;font-size:0.9rem;white-space:nowrap;border:none;background:none;color:var(--muted);cursor:pointer;font-weight:500;border-bottom:2px solid transparent;transition:all 0.2s}
.cat.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Menu items */
.menu-section{padding:16px}
.section-title{font-size:1rem;font-weight:700;margin:0 0 12px;padding-top:8px}
.menu-item{display:flex;gap:12px;background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:10px;border:1px solid var(--border);align-items:center}
.menu-item .info{flex:1;min-width:0}
.menu-item .name{font-weight:600;font-size:0.95rem}
.menu-item .desc{font-size:0.78rem;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-item .price{color:var(--accent);font-weight:700;font-size:1rem;margin-top:4px}
.menu-item .add-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--accent);background:#fff;color:var(--accent);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.menu-item .add-btn:active{background:var(--accent);color:#fff}
.menu-item .qty-ctrl{display:flex;align-items:center;gap:8px}
.menu-item .qty-ctrl button{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.menu-item .qty-ctrl .qty{font-weight:600;min-width:20px;text-align:center}
/* Cart bar */
.cart-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,0.08)}
.cart-bar .cart-icon{position:relative;width:44px;height:44px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;flex-shrink:0}
.cart-bar .badge{position:absolute;top:-4px;right:-4px;background:#e74c3c;color:#fff;font-size:0.7rem;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-bar .total{flex:1}
.cart-bar .total .amount{font-weight:700;font-size:1.1rem;color:var(--accent)}
.cart-bar .total .hint{font-size:0.75rem;color:var(--muted)}
.cart-bar .submit-btn{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-size:0.95rem;font-weight:600;cursor:pointer;white-space:nowrap}
.cart-bar .submit-btn:disabled{opacity:0.5}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-end}
.modal-overlay.active{display:flex}
.modal{background:#fff;width:100%;max-width:480px;max-height:70vh;border-radius:16px 16px 0 0;padding:20px 16px;overflow-y:auto}
.modal h3{font-size:1.1rem;margin-bottom:16px;text-align:center}
.modal .cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.9rem}
.modal .cart-item .item-qty{display:flex;align-items:center;gap:8px}
.modal .cart-item .item-qty button{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer}
.modal .cart-total{text-align:right;padding:16px 0;font-weight:700;font-size:1.1rem}
.modal .cart-total span{color:var(--accent);font-size:1.4rem}
.modal .confirm-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:8px}
.modal .close-btn{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-size:0.9rem;cursor:pointer}
/* Order success */
.success-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;justify-content:center;align-items:center}
.success-overlay.active{display:flex}
.success-card{background:#fff;border-radius:16px;padding:32px 24px;text-align:center;width:300px}
.success-card .check{font-size:4rem;margin-bottom:16px}
.success-card h3{font-size:1.3rem;margin-bottom:8px}
.success-card p{color:var(--muted);font-size:0.9rem;margin-bottom:20px}
.success-card button{padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-size:1rem;cursor:pointer}
/* Note */
.note-bar{background:#fffbf0;border:1px solid #f0d78c;border-radius:8px;padding:12px;margin:12px 16px;font-size:0.8rem;color:#8b6914;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="shop-name">🍜 老王家面馆</div>
  <div class="shop-desc">三十年老店 · 手工拉面 · 祖传汤底</div>
  <div class="table-info">🪑 桌号：A3 | 扫码点餐 · 先吃后付</div>
</div>

<div class="note-bar">💡 本店自营点餐系统，不抽佣、不加价，比外卖平台便宜 20%</div>

<div class="cats" id="cats">
  <button class="cat active" data-cat="all">🔥 全部</button>
  <button class="cat" data-cat="noodle">🍜 面食</button>
  <button class="cat" data-cat="rice">🍚 米饭</button>
  <button class="cat" data-cat="snack">🥟 小吃</button>
  <button class="cat" data-cat="drink">🥤 饮品</button>
</div>

<div id="menu-container"></div>

<div class="cart-bar" id="cart-bar">
  <div class="cart-icon" id="cart-toggle">
    🛒<span class="badge" id="cart-count" style="display:none">0</span>
  </div>
  <div class="total">
    <div class="amount" id="total-price">¥0.00</div>
    <div class="hint">点击购物车查看详情</div>
  </div>
  <button class="submit-btn" id="submit-btn" disabled>去下单</button>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cart-modal">
  <div class="modal">
    <h3>🛒 已选菜品</h3>
    <div id="cart-items"></div>
    <div class="cart-total">合计：<span id="modal-total">¥0.00</span></div>
    <button class="confirm-btn" id="confirm-order">确认下单 · <span id="confirm-total">¥0.00</span></button>
    <button class="close-btn" id="close-cart">继续点菜</button>
  </div>
</div>

<!-- Success -->
<div class="success-overlay" id="success-overlay">
  <div class="success-card">
    <div class="check">✅</div>
    <h3>下单成功！</h3>
    <p>订单号：#<span id="order-num">1001</span></p>
    <p>厨房正在准备，请稍候~</p>
    <button id="close-success">好的</button>
  </div>
</div>

<script>
const menu={
  noodle:[
    {name:'招牌牛肉拉面',desc:'澳洲牛腱 · 手工拉制 · 骨汤熬制8小时',price:28},
    {name:'红烧牛肉面',desc:'大块牛腩 · 浓油赤酱',price:32},
    {name:'炸酱面',desc:'老北京风味 · 肉末炸酱 · 黄瓜丝',price:18},
    {name:'油泼面',desc:'陕西风味 · 滚油泼辣子 · 蒜香四溢',price:16},
    {name:'西红柿鸡蛋面',desc:'家常味道 · 酸甜可口',price:14},
  ],
  rice:[
    {name:'红烧牛腩饭',desc:'牛腩软烂 · 汤汁浇饭',price:30},
    {name:'宫保鸡丁饭',desc:'鸡腿肉 · 花生碎 · 微辣',price:22},
    {name:'回锅肉饭',desc:'五花肉 · 蒜苗 · 郫县豆瓣',price:24},
  ],
  snack:[
    {name:'手工水饺',desc:'猪肉白菜馅 · 12只/份',price:18},
    {name:'红油抄手',desc:'麻辣鲜香 · 8只/份',price:15},
    {name:'葱花饼',desc:'外酥里软 · 现烙',price:8},
    {name:'凉拌黄瓜',desc:'蒜泥 · 香醋 · 爽脆',price:8},
  ],
  drink:[
    {name:'冰镇酸梅汤',desc:'古法熬制 · 消暑解渴',price:6},
    {name:'自制豆浆',desc:'现磨 · 冷热可选',price:5},
    {name:'王老吉',desc:'罐装',price:6},
  ]
};

let cart={};
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

function addItem(id){cart[id]=(cart[id]||0)+1;renderCart()}
function removeItem(id){if(cart[id]>1)cart[id]--;else delete cart[id];renderCart()}

function getTotal(){
  let t=0;
  Object.entries(cart).forEach(([id,qty])=>{
    const cat=id.split('-')[0],idx=parseInt(id.split('-')[1]);
    const item=menu[cat][idx];
    t+=item.price*qty;
  });
  return t;
}

function renderMenu(filter='all'){
  const container=$('#menu-container');
  let html='';
  Object.entries(menu).forEach(([cat,items])=>{
    if(filter!=='all'&&cat!==filter)return;
    const catNames={noodle:'🍜 面食',rice:'🍚 米饭',snack:'🥟 小吃',drink:'🥤 饮品'};
    html+=`<div class="menu-section"><div class="section-title">${catNames[cat]}</div>`;
    items.forEach((item,i)=>{
      const id=`${cat}-${i}`,qty=cart[id]||0;
      html+=`<div class="menu-item"><div class="info"><div class="name">${item.name}</div><div class="desc">${item.desc}</div><div class="price">¥${item.price}</div></div>`;
      if(qty===0) html+=`<button class="add-btn" onclick="addItem('${id}')">+</button>`;
      else html+=`<div class="qty-ctrl"><button onclick="removeItem('${id}')">−</button><span class="qty">${qty}</span><button onclick="addItem('${id}')">+</button></div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  if(!html) html='<div style="text-align:center;padding:40px;color:var(--muted)">暂无菜品</div>';
  container.innerHTML=html;
}

function renderCart(){
  const total=getTotal(),count=Object.values(cart).reduce((a,b)=>a+b,0);
  $('#total-price').textContent='¥'+total.toFixed(2);
  $('#cart-count').textContent=count;
  $('#cart-count').style.display=count>0?'flex':'none';
  $('#submit-btn').disabled=count===0;

  // Modal cart
  const itemsDiv=$('#cart-items');
  if(count===0){itemsDiv.innerHTML='<p style="text-align:center;color:var(--muted);padding:20px">购物车为空</p>';}
  else{
    itemsDiv.innerHTML=Object.entries(cart).map(([id,qty])=>{
      const cat=id.split('-')[0],idx=parseInt(id.split('-')[1]),item=menu[cat][idx];
      return `<div class="cart-item"><span>${item.name}</span><div class="item-qty"><button onclick="removeItem('${id}')">−</button><span>${qty}</span><button onclick="addItem('${id}')">+</button></div><span style="font-weight:600">¥${(item.price*qty).toFixed(2)}</span></div>`;
    }).join('');
  }
  $('#modal-total').textContent='¥'+total.toFixed(2);
  $('#confirm-total').textContent='¥'+total.toFixed(2)+' 下单';
}

// Events
$('#cart-toggle').addEventListener('click',()=>{$('#cart-modal').classList.add('active')});
$('#close-cart').addEventListener('click',()=>{$('#cart-modal').classList.remove('active')});
$('#cart-modal').addEventListener('click',e=>{if(e.target===$('#cart-modal'))$('#cart-modal').classList.remove('active')});

$('#confirm-order').addEventListener('click',()=>{
  const orderNum=Math.floor(Math.random()*9000+1000);
  const items=Object.entries(cart).map(([id,qty])=>{
    const cat=id.split('-')[0],idx=parseInt(id.split('-')[1]);
    return {name:menu[cat][idx].name,price:menu[cat][idx].price,qty};
  });
  const order={orderNum,table:'A3',time:new Date().toISOString(),items,total:getTotal(),status:'new'};
  const orders=JSON.parse(localStorage.getItem('admin_orders')||'[]');
  orders.push(order);
  localStorage.setItem('admin_orders',JSON.stringify(orders));
  $('#cart-modal').classList.remove('active');
  $('#success-overlay').classList.add('active');
  $('#order-num').textContent=orderNum;
});
$('#close-success').addEventListener('click',()=>{
  $('#success-overlay').classList.remove('active');
  cart={};renderMenu($('#cats').querySelector('.active').dataset.cat);renderCart();
});

$('#submit-btn').addEventListener('click',()=>{$('#cart-modal').classList.add('active')});

$$('#cats .cat').forEach(cat=>cat.addEventListener('click',()=>{
  $$('#cats .cat').forEach(c=>c.classList.remove('active'));
  cat.classList.add('active');
  renderMenu(cat.dataset.cat);
}));

renderMenu();renderCart();
</script>
</body>
</html>
